name: Power Rankings

on:
  schedule:
    - cron: '0 15 * * 2'  # Tuesday 9am CST (UTC-6)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  power-rankings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests anthropic python-dotenv jupyter nbconvert

      - name: Run power rankings notebook
        working-directory: notebooks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: '1'
        run: |
          jupyter nbconvert --to notebook --execute power_rankings.ipynb --output power_rankings.ipynb --ExecutePreprocessor.timeout=300

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/power_rankings.json
          git diff --quiet --cached || git commit -m "Auto-update power rankings [skip ci]" && git push
