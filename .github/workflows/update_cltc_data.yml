name: Update CLTC Data

on:
  schedule:
    - cron: '0 14 * * 0,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Python dependencies
        run: |
          pip install requests pandas numpy selenium webdriver-manager beautifulsoup4 nfl-data-py

      - name: Run data update script
        working-directory: notebooks
        env:
          PYTHONUNBUFFERED: '1'
        run: python cltc_teams.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cltc-dynasty/public/data/
          git diff --quiet --cached || git commit -m "Auto-update CLTC data [skip ci]" && git push
